<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Informasi & Berita Terintegrasi</title>
    <style>
        /* CSS RESET & GENERAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
        }

        /* HEADER STYLES */
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('logo.jpg') no-repeat center center/cover;
            color: white;
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            min-height: 120px;
        }
        .header-title {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
        }
        .header-meta-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .live-datetime {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }
        .live-clock {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }
        .live-date {
            font-size: 12px;
            margin-top: 3px;
            color: #ffcc00;
            font-weight: bold;
        }

        /* SEARCH BAR COMPONENT - BARU */
        .search-container {
            display: flex;
            background: #fff;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .search-input {
            border: none;
            padding: 6px 10px;
            outline: none;
            font-size: 13px;
            width: 180px;
        }
        .search-btn {
            background: #ff6600;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .search-btn:hover {
            background: #e65c00;
        }

        /* NAVIGATION BAR WITH DINAMIC HOVER */
        nav {
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 20px;
            display: flex;
            gap: 25px;
            overflow-x: auto;
        }
        nav a {
            text-decoration: none;
            color: #000000;
            font-size: 14px; 
            font-weight: bold;
            white-space: nowrap;
            padding-bottom: 5px;
            display: inline-block;
            cursor: pointer;
            border-bottom: 2px solid transparent; 
            transition: color 0.15s ease-in-out, border-bottom 0.15s ease-in-out;
        }
        nav a.active {
            color: #ff6600;
            border-bottom: 2px solid #ff6600;
        }
        nav:hover a.active {
            color: #000000;
            border-bottom: 2px solid transparent;
        }
        nav a:hover {
            color: #ff6600 !important;
            border-bottom: 2px solid #ff6600 !important;
        }

        /* LAYOUT CONTENT */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: 180px 1fr 250px;
            gap: 20px;
        }
        .sidebar-left, .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .ad-space {
            background-color: #fff9e6;
            border: 1px dashed #ffcc00;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-radius: 4px;
        }
        .ad-space.vertical {
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ad-link {
            color: #ff6600;
            font-weight: bold;
            margin-top: 10px;
            display: block;
            font-size: 11px;
        }

        /* MAIN AREA & NEWS GRID CARD - BARU */
        .main-content {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 20px;
        }
        .section-title {
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 5px;
            margin-bottom: 15px;
            color: #222;
        }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .news-card {
            border: 1px solid #eee;
            border-radius: 4px;
            overflow: hidden;
            background: #fff;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .news-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .news-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }
        .news-card-body {
            padding: 10px;
        }
        .news-card-tag {
            font-size: 10px;
            color: #ff6600;
            text-transform: uppercase;
            font-weight: bold;
        }
        .news-card-title {
            font-size: 13px;
            font-weight: bold;
            margin: 5px 0;
            color: #222;
            line-height: 1.4;
        }

        /* SLIDER SYSTEM */
        .news-hero {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            align-items: start;
        }
        .slider-container {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
            border-radius: 4px;
        }
        .slider-wrapper {
            display: flex;
            width: 400%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .slide {
            width: 25%;
            height: 100%;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 15;
        }
        .slider-dots {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 15;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active {
            background: #ff6600;
            width: 18px;
            border-radius: 4px;
        }
        .news-welcome {
            font-size: 14px;
            line-height: 1.6;
            color: #444;
        }

        /* DETAIL BERITA AREA COMPONENT - BARU */
        .detail-container {
            display: none;
        }
        .btn-back {
            background: #333;
            color: #fff;
            border: none;
            padding: 6px 15px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn-back:hover { background: #555; }
        .detail-img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .detail-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .detail-content {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
            text-align: justify;
        }

        /* VIDEO & FOOTER */
        .video-box {
            background-color: #000;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .play-button {
            width: 60px;
            height: 60px;
            background-color: #ff0000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-button::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-left: 18px solid white;
            margin-left: 5px;
        }
        footer {
            background-color: #111;
            color: #aaa;
            text-align: center;
            padding: 15px;
            font-size: 12px;
            margin-top: 40px;
        }
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;

    </div>

    <!-- FOOTER AREA -->
    <footer>
        &copy; 2026 Portal Berita Terintegrasi. Copyright All Rights Reserved.
    </footer>

    <!-- 6. ENGINE CONTROLLER JAVASCRIPT SYSTEM -->
    <script>
        // DATA LOKAL SIMULASI (DATABASE ARTIKEL BERITA)
        const articlesDatabase = [
            {
                id: 1,

                image: "masjid.jpg",

            {

            },
            {
                id: 3,
                title: "Panduan Olahraga Ringan di Taman Kota Sore Hari",

            },
            {
                id: 4,
                title: "Keseruan Turnamen Tenis Meja Antar Komunitas",
                category: "olahraga",
                image: "pingpong.jpg",
                author: "Rian Hidayat",
                date: "17 Juni 2026",
                content: "Turnamen tenis meja amatir lokal sukses mempertemukan berbagai klub pingpong dari berbagai wilayah. Kegiatan positif ini diselenggarakan untuk memupuk sportivitas sekaligus mencari bibit atlet muda berbakat baru yang ke depannya diharapkan mampu mewakili daerah di kancah nasional."
            },
            {
                id: 5,
                title: "Festival Kuliner Halal Tradisional Nusantara Resmi Dibuka",
                category: "kuliner",
                image: "lapangan-hijau.jpg", // Menggunakan resource gambar lokal Anda

            },
            {
                id: 6,
                title: "Promo Space Iklan Banner Strategis Portal Berita",
                category: "iklan",
                image: "masjid.jpg",
                author: "Tim Pemasaran",
                date: "15 Juni 2026",
                content: "Tingkatkan konversi penjualan bisnis Anda dengan memasang banner iklan strategis di portal berita kami yang memiliki jangkauan pembaca luas setiap harinya. Tersedia slot iklan banner sisi kiri vertikal dan sisi kanan responsif dengan harga khusus UMKM selama bulan ini."
            }
        ];

        // RENDER JAM & TANGGAL REALTIME
        function updateDateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = hours + ":" + minutes + ":" + seconds;
            
            const opsiTanggal = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('id-ID', opsiTanggal);
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // INTEGRASI FUNGSI RENDER GRID DATA ARTIKEL
        function renderArticles(articlesList) {
            const gridArea = document.getElementById('newsGridArea');
            gridArea.innerHTML = "";

            if (articlesList.length === 0) {
                gridArea.innerHTML = "<p style='grid-column: 1/-1; text-align:center; padding: 20px; color:#999;'>Artikel tidak ditemukan...</p>";
                return;
            }

            articlesList.forEach(item => {
                const card = document.createElement('div');
                card.className = "news-card";
                card.onclick = () => showDetailArticle(item.id);
                card.innerHTML = `
                    <img src="${item.image}" alt="${item.title}">
                    <div class="news-card-body">
                        <span class="news-card-tag">${item.category}</span>
                        <h4 class="news-card-title">${item.title}</h4>
                        <p style="font-size:11px; color:#777;">${item.date}</p>
                    </div>
                `;
                gridArea.appendChild(card);
            });
        }

        // FUNGSI FILTER KATEGORI DINAMIS
        function filterCategory(categoryName, element) {
            // Update UI Menu Navigasi Aktif
            const links = document.querySelectorAll('#mainNav a');
            links.forEach(link => link.classList.remove('active'));
            element.classList.add('active');

            // Kontrol Visibilitas Banner Hero (Hanya Muncul di Menu Home / Semua)
            const hero = document.getElementById('heroSection');
            if (categoryName === 'semua') {
                hero.style.display = "grid";
                document.getElementById('contentTitle').textContent = "Berita Utama";
                renderArticles(articlesDatabase);
            } else {
                hero.style.display = "none";
                document.getElementById('contentTitle').textContent = "Kategori: " + categoryName;
                const filtered = articlesDatabase.filter(art => art.category === categoryName);
                renderArticles(filtered);
            }
            backToGrid();
        }

        // FUNGSI PENCARIAN ARTIKEL (SEARCH BAR ENGINE)
        function searchArticles() {
            const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
            const hero = document.getElementById('heroSection');
            hero.style.display = "none";
            
            document.getElementById('contentTitle').textContent = "Hasil Pencarian: \"" + keyword + "\"";
            
            const results = articlesDatabase.filter(art => 
                art.title.toLowerCase().includes(keyword) || 
                art.content.toLowerCase().includes(keyword)
            );
            
            renderArticles(results);
            backToGrid();
        }

        // FUNGSI MEMBUKA DETAIL ISI BERITA
        function showDetailArticle(id) {
            const article = articlesDatabase.find(art => art.id === id);
            if (!article) return;

            document.getElementById('dynamicContent').style.display = "none";
            
            const detailArea = document.getElementById('detailContent');
            document.getElementById('detailTitle').textContent = article.title;
            document.getElementById('detailMeta').textContent = `Kategori: ${article.category} | Penulis: ${article.author} | ${article.date}`;
            document.getElementById('detailImage').src = article.image;
            document.getElementById('detailBody').textContent = article.content;
            
            detailArea.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // FUNGSI TOMBOL KEMBALI
        function backToGrid() {
            document.getElementById('detailContent').style.display = "none";
            document.getElementById('dynamicContent').style.display = "block";
        }

        // INTERAKSI BANNER SLIDER SISTEM
        let currentIndex = 0;
        const totalSlides = 4;
        const wrapper = document.getElementById('sliderWrapper');
        const dots = document.querySelectorAll('.dot');
        let slideInterval = setInterval(autoSlide, 4000);
