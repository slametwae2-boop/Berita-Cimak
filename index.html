<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Informasi & Berita Terintegrasi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 20px; }
        header { background: #333; color: white; padding: 20px; text-align: center; border-radius: 4px; }
        nav { background: #fff; padding: 10px; margin: 10px 0; border-radius: 4px; display: flex; gap: 15px; }
        nav a { text-decoration: none; color: #333; font-weight: bold; }
        .container { max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .main-content { background: white; padding: 20px; border-radius: 4px; min-height: 400px; }
        .sidebar { background: #fff9e6; padding: 20px; border-radius: 4px; text-align: center; }
        .news-card { border-bottom: 1px solid #ddd; padding: 15px 0; cursor: pointer; }
        .news-card h3 { color: #ff6600; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>Portal Informasi & Berita</h1>
        <div id="clock" style="font-weight: bold; margin-top: 10px; color: #ffcc00;">00:00:00</div>
    </header>

    <nav id="mainNav">
        <a href="#" onclick="filterCat('semua')">Home</a>
        <a href="#" onclick="filterCat('berita')">Berita</a>
        <a href="#" onclick="filterCat('olahraga')">Olahraga</a>
    </nav>

    <div class="container">
        <main class="main-content">
            <h2 id="contentTitle" style="margin-bottom: 15px;">Berita Utama</h2>
            <div id="newsGridArea"><!-- Berita muncul di sini --></div>
        </main>
        <aside class="sidebar">
            <h3>Ruang Iklan</h3>
            <p style="margin-top: 20px; color: #666;">Hubungi Redaksi</p>
        </aside>
    </div>

    <script>
        const articlesDatabase = [
            { id: 1, title: "Peresmian Megah Masjid Raya Kota", category: "berita", content: "Masjid Raya Kota akhirnya resmi dibuka untuk umum setelah renovasi total dua tahun..." },
            { id: 2, title: "Persiapan Pemeliharaan Rumput Stadion Utama", category: "olahraga", content: "Menjelang kompetisi internasional, pengelola mulai merawat rumput secara intensif..." },
            { id: 3, title: "Panduan Olahraga Ringan di Sore Hari", category: "olahraga", content: "Aktivitas fisik ringan di sore hari terbukti menurunkan tingkat stres secara signifikan..." }
        ];

        function renderArticles(data) {
            const grid = document.getElementById('newsGridArea');
            grid.innerHTML = '';
            if(data.length === 0) {
                grid.innerHTML = '<p>Tidak ada berita.</p>';
                return;
            }
            data.forEach(art => {
                const div = document.createElement('div');
                div.className = 'news-card';
                div.innerHTML = `<h3>${art.title}</h3><p>${art.content}</p>`;
                grid.appendChild(div);
            });
        }

        function filterCat(cat) {
            document.getElementById('contentTitle').innerText = cat === 'semua' ? "Berita Utama" : `Kategori: ${cat.toUpperCase()}`;
            const filtered = cat === 'semua' ? articlesDatabase : articlesDatabase.filter(a => a.category === cat);
            renderArticles(filtered);
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }, 1000);

        window.onload = () => { renderArticles(articlesDatabase); };
    </script>
</body>
</html>
