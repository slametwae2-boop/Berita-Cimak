<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pasang Iklan - Portal Berita Cimak</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #334155;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 600px;
            background: #ffffff;
            margin: 40px auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-top: 5px solid #28a745;
        }
        h2 {
            margin-top: 0;
            color: #1e293b;
            font-size: 24px;
        }
        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="text"], input[type="email"], input[type="tel"], select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            color: #334155;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.15);
        }
        .btn-submit {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Formulir Pengajuan Iklan</h2>
        <p>Silakan isi data di bawah ini. Tim Hubungan Masyarakat kami akan segera menghubungi Anda dalam waktu maksimal 1x24 jam.</p>
        
        <!-- Pemroses menggunakan layanan FormSubmit gratis -->
        <form action="https://formsubmit.co" method="POST">
            
            <!-- Pencegahan Spam / Captcha Otomatis -->
            <input type="text" name="_honey" style="display:none">
            <input type="hidden" name="_template" value="table">
            
            <div class="form-group">
                <label for="nama">Nama Lengkap / Nama Perusahaan</label>
                <input type="text" id="nama" name="Nama_Pengiklan" placeholder="Contoh: PT Maju Jaya atau Ahmad" required>
            </div>

            <div class="form-group">
                <label for="email">Alamat Email Aktif</label>
                <input type="email" id="email" name="Email_Kontak" placeholder="Contoh: nama@email.com" required>
            </div>

            <div class="form-group">
                <label for="whatsapp">Nomor WhatsApp (Aktif)</label>
                <input type="tel" id="whatsapp" name="No_WhatsApp" placeholder="Contoh: 08123456789" required>
            </div>

            <div class="form-group">
                <label for="jenis-iklan">Jenis Paket Iklan</label>
                <select id="jenis-iklan" name="Jenis_Paket_Iklan" required>
                    <option value="" disabled selected>-- Pilih Posisi Iklan --</option>
                    <option value="Banner Atas (Header)">Banner Atas Website (Header)</option>
                    <option value="Banner Samping (Sidebar)">Banner Samping Artikel (Sidebar)</option>
                    <option value="Artikel Sponsor (Content)">Artikel Berita Sponsor (Paid Promote)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="pesan">Detail Tambahan / Pesan</label>
                <textarea id="pesan" name="Catatan_Tambahan" rows="4" placeholder="Tuliskan detail produk atau tautan yang ingin Anda iklankan..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Kirim Pengajuan Iklan</button>
        </form>
    </div>

</body>
</html>
